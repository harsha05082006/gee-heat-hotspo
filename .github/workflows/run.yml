name: Run GEE Automation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Python
        uses: actions/setup-python@v5   # ✅ updated
        with:
          python-version: '3.10'

      - name: Install Earth Engine
        run: pip install earthengine-api

      - name: Create key.json
        run: echo '${{ secrets.GEE_KEY }}' > key.json

      # 🔍 DEBUG STEP (VERY IMPORTANT)
      - name: Show files
        run: ls -R

      # 🔑 AUTH TEST (OPTIONAL BUT USEFUL)
      - name: Test authentication
        run: |
          python - <<EOF
          import ee
          ee.Initialize(
              credentials=ee.ServiceAccountCredentials(
                  None, 'key.json'
              )
          )
          print("✅ Earth Engine Auth Success")
          EOF

      - name: Run script
        run: python main.py
