name: Run GEE Automation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Earth Engine
        run: pip install earthengine-api

      - name: Create key.json
        run: echo '${{ secrets.GEE_KEY }}' > key.json

      - name: Run script
        run: python main.py
